name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Fixed #9: Added proper workflow-level permissions
permissions:
  contents: write

jobs:
  lint:
    name: Lint Codebase
    runs-on: ubuntu-latest
    steps:
      # Fixed #10: Fetch full history
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Fixed #11: Explicit dependency caching mapping for monorepos
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # Fixed #12: Ensure Python setup is clean for the repository context
      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Fixed #1: Removed '|| true' to let lint jobs fail correctly
      - name: Install & Lint Backend
        working-directory: backend
        run: |
          npm ci
          npm run lint

      - name: Install & Lint Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run lint

  build-and-push:
    name: Build & Push Images
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build and push Backend (Fixed #2 & #6: Clean caching layer and correct relative build contexts)
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-platform-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-platform-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push Worker (Fixed #7: Relies on localized build context inside worker/)
      - name: Build & Push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-platform-worker:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-platform-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push Frontend (Fixed #8: Uses localized build context inside frontend/)
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-platform-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-platform-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-manifests:
    name: Update GitOps Manifests
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # Fixed #3 & #4: Targeted explicit infra repo. PAT requires repo scope permissions.
      - name: Checkout Infra Repository
        uses: actions/checkout@v4
        with:
          repository: nitindahiya-dev/ai-task-platform-infra
          token: ${{ secrets.GITOPS_PAT }}
          path: infra-repo
          fetch-depth: 0

      # Fixed #5: Corrected sed target pathing to match your actual kubernetes folder layout
      - name: Update Image Tags
        run: |
          cd infra-repo/kubernetes
          
          # Replace backend image tag
          sed -i "s|image:.*ai-task-platform-backend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-platform-backend:${{ github.sha }}|g" backend.yaml
          
          # Replace worker image tag
          sed -i "s|image:.*ai-task-platform-worker:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-platform-worker:${{ github.sha }}|g" worker.yaml
          
          # Replace frontend image tag
          sed -i "s|image:.*ai-task-platform-frontend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-platform-frontend:${{ github.sha }}|g" frontend.yaml

      - name: Commit and Push Changes
        run: |
          cd infra-repo
          git config --global user.name "gitops-bot"
          git config --global user.email "gitops-bot@users.noreply.github.com"
          git add kubernetes/
          git diff-index --quiet HEAD || git commit -m "Auto-update image tags to ${{ github.sha }} [skip ci]"
          git push origin main