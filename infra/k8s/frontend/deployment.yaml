apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: ai-task-platform

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend

          image: nitindahiya199/ai-task-platform-frontend:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 80

          resources:
            requests:
              cpu: 100m
              memory: 128Mi

            limits:
              cpu: 300m
              memory: 256Mi

          livenessProbe:
            httpGet:
              path: /
              port: 80

            initialDelaySeconds: 15

          readinessProbe:
            httpGet:
              path: /
              port: 80

            initialDelaySeconds: 5