apiVersion: apps/v1
kind: Deployment

metadata:
  name: worker
  namespace: ai-task-platform

spec:
  replicas: 2

  selector:
    matchLabels:
      app: worker

  template:
    metadata:
      labels:
        app: worker

    spec:
      containers:
        - name: worker

          image: nitindahiya199/ai-task-platform-worker:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          envFrom:
            - configMapRef:
                name: ai-platform-config

            - secretRef:
                name: ai-platform-secret

          resources:
            requests:
              cpu: 100m
              memory: 128Mi

            limits:
              cpu: 300m
              memory: 256Mi

          livenessProbe:
            httpGet:
              path: /health
              port: 8080

            initialDelaySeconds: 20

          readinessProbe:
            httpGet:
              path: /health
              port: 8080

            initialDelaySeconds: 10