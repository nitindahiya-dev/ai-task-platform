version: "3.8"

services:
  redis:
    image: redis:7.0-alpine
    container_name: ai-platform-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    command: redis-server --appendonly yes

    networks:
      - ai-network

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: ai-platform-backend

    restart: unless-stopped

    env_file:
      - ./backend/.env

    ports:
      - "5000:5000"

    depends_on:
      redis:
        condition: service_healthy

    networks:
      - ai-network

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:5000/healthz",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile

    container_name: ai-platform-worker

    restart: unless-stopped

    env_file:
      - ./backend/.env

    environment:
      WORKER_HEALTH_PORT: 8080

    depends_on:
      redis:
        condition: service_healthy

    networks:
      - ai-network

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: ai-platform-frontend

    restart: unless-stopped

    ports:
      - "3000:80"

    depends_on:
      backend:
        condition: service_healthy

    networks:
      - ai-network

networks:
  ai-network:
    driver: bridge

volumes:
  redis_data: